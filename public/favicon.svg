<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22B8C8"/>
      <stop offset="50%" stop-color="#1A9DB0"/>
      <stop offset="100%" stop-color="#0F7A8A"/>
    </linearGradient>
    <linearGradient id="bgRadial" cx="45%" cy="40%" r="55%" fx="35%" fy="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2ECAD8"/>
      <stop offset="100%" stop-color="#0A7080"/>
    </linearGradient>
    <radialGradient id="bgFill" cx="45%" cy="40%" r="70%" fx="30%" fy="25%">
      <stop offset="0%" stop-color="#2FD0DF"/>
      <stop offset="60%" stop-color="#1AA8BA"/>
      <stop offset="100%" stop-color="#0B718A"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgFill)"/>

  <!-- Subtle highlight overlay top-left -->
  <ellipse cx="180" cy="150" rx="200" ry="130" fill="white" opacity="0.06"/>

  <!-- Medical cross (white, slightly transparent) -->
  <!-- Horizontal bar -->
  <rect x="88" y="188" width="336" height="136" rx="28" ry="28" fill="white" opacity="0.92"/>
  <!-- Vertical bar -->
  <rect x="188" y="88" width="136" height="336" rx="28" ry="28" fill="white" opacity="0.92"/>

  <!-- Cross center fill to fix overlap opacity -->
  <rect x="188" y="188" width="136" height="136" fill="white" opacity="0.92"/>

  <!-- Bar chart bars (teal, inside the cross area, right side) -->
  <rect x="218" y="262" width="26" height="52" rx="5" fill="#1AA8BA" opacity="0.85"/>
  <rect x="252" y="240" width="26" height="74" rx="5" fill="#1AA8BA" opacity="0.85"/>
  <rect x="286" y="222" width="26" height="92" rx="5" fill="#0F8A9A" opacity="0.85"/>

  <!-- Upward trend arrow line -->
  <polyline
    points="210,305 245,272 278,252 315,228"
    stroke="#0D7A8A"
    stroke-width="10"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrowhead -->
  <polygon points="315,228 295,230 308,247" fill="#0D7A8A"/>

  <!-- Small sparkle dots (top-right corner accent) -->
  <circle cx="400" cy="95" r="5" fill="white" opacity="0.6"/>
  <circle cx="418" cy="112" r="3" fill="white" opacity="0.4"/>
  <circle cx="386" cy="110" r="3" fill="white" opacity="0.4"/>
</svg>
